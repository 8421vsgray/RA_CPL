# 实验基本信息
experiment_name: "RA-CPL-MNIST-80-Noise"
device: "cuda"

# 数据配置
data:
  path: "data/MNIST_10k.mat"
  batch_size: 512
  noise_rate: 0.8
  view_dims: [30, 9, 30]

# 模型架构
model:
  latent_dim: 128
  n_clusters: 10

# 优化器与损失权重
training:
  lr: 0.001
  weight_decay: 0.0001
  total_epochs: 200
  pretrain_epochs: 0

  # 战神审计参数
  audit:
    bias: 2.0
    tau: 0.5
    loss_recon_w: 10.0
    loss_align_w: 1.0
    loss_clu_w: 0.1

# 质心同步策略 (CSR)
csr:
  update_interval_early: 5
  update_interval_late: 1
  switch_epoch: 150